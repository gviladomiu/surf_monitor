# =============================================================================
# .github/workflows/surf-monitor.yml
# =============================================================================
# Workflow de GitHub Actions que ejecuta el monitor de surf de Castelldefels.
#
# Consulta la API de Open-Meteo (Marine API + Forecast API), por lo que no
# necesita navegador. Basta con Python y la libreria 'requests'.
#
# Las credenciales de Telegram y las coordenadas del spot se leen de los
# "Secrets" del repositorio (Settings -> Secrets and variables -> Actions).
#
# NOTA SOBRE LA CLAVE "on":
#   La palabra "on" sin comillas es una palabra reservada de YAML y algunos
#   parsers la interpretan como el booleano true. Por eso aqui va SIEMPRE
#   entre comillas: "on".
# =============================================================================

name: Surf Monitor Castelldefels

# -----------------------------------------------------------------------------
# CUANDO SE EJECUTA  (clave "on" entre comillas a proposito)
# -----------------------------------------------------------------------------
"on":
  # 1) Programado: cada 6 horas, en el minuto 5 (horario UTC).
  #    "5 */6 * * *" -> 00:05, 06:05, 12:05 y 18:05 UTC.
  schedule:
    - cron: "5 */6 * * *"

  # 2) Manual: boton "Run workflow" en la pestana Actions, util para probar.
  workflow_dispatch:

# -----------------------------------------------------------------------------
# PERMISOS: solo lectura del repo, es lo mas seguro.
# -----------------------------------------------------------------------------
permissions:
  contents: read

# -----------------------------------------------------------------------------
# CONCURRENCIA: si se solapan dos ejecuciones, cancelamos la anterior.
# -----------------------------------------------------------------------------
concurrency:
  group: surf-monitor
  cancel-in-progress: true

jobs:
  monitor:
    name: Comprobar condiciones de surf
    runs-on: ubuntu-latest
    timeout-minutes: 5

    # -------------------------------------------------------------------------
    # VARIABLES DE ENTORNO
    # -------------------------------------------------------------------------
    # Secretos (sensibles) + coordenadas -> en Settings > Secrets > Actions
    # Parametros de configuracion        -> aqui en claro, faciles de editar.
    #
    # Los umbrales estan calibrados para Castelldefels (spot mediterraneo de
    # swell debil). Para entender por que estos valores, ver la cabecera de
    # surf_monitor.py.
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      SPOT_LATITUDE: ${{ secrets.SPOT_LATITUDE }}
      SPOT_LONGITUDE: ${{ secrets.SPOT_LONGITUDE }}
      SPOT_NAME: "Castelldefels"
      # --- Umbrales que definen si una franja es surfeable ---
      WAVE_THRESHOLD: "0.8"        # altura total minima (m)
      PERIOD_THRESHOLD: "4.0"      # periodo minimo (s)
      WIND_MAX_KMH: "20"          # viento maximo (km/h)
      WIND_WAVE_DOMINANCE: "1.5"   # factor de dominancia del wind wave
      DAYLIGHT_MARGIN_MIN: "30"    # min de margen al amanecer/anochecer
      CONSECUTIVE_SLOTS: "3"       # franjas seguidas para disparar la alerta
      TIMEZONE: "Europe/Madrid"
      LOG_LEVEL: "INFO"

    steps:
      # 1) Descargar el codigo del repositorio.
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      # 2) Instalar Python 3.12.
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # 3) Instalar dependencias (solo 'requests').
      - name: Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4) Ejecutar el monitor.
      - name: Ejecutar Surf Monitor
        run: python surf_monitor.py
